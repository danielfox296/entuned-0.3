# Nixpacks installs Node 20; we activate pnpm via corepack (bundled with modern Node).
[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "corepack enable",
  "corepack prepare pnpm@9.12.0 --activate",
  "pnpm install"
]

[phases.build]
cmds = [
  "pnpm prisma generate",
  "pnpm build",
  "pnpm prisma migrate deploy"
]

[start]
cmd = "pnpm start"
