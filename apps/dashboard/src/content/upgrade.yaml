# upgrade — copy for the in-app upgrade page
# Edit this file to change copy on /upgrade. Vite HMR refreshes instantly.
# Section ids drive deep-linking from the player's locked-tile CTA — keep
# them stable. The player links to e.g. /upgrade#outcomes.

eyebrow: "Upgrade"
heading: "More music. Made for your customer."
subhead: "Step into Core. All nine research-backed outcomes, music engineered for your specific Ideal Customer Profile, and a 300-song library that grows every month."
price_line: "$99 / location / month — monthly billing, cancel anytime."
cta_primary: "Upgrade to Core — $99/loc/mo"
cta_secondary_lead: "Need multi-fleet pricing?"
cta_secondary_link_label: "Talk to Enterprise"
cta_secondary_link_url: "https://entuned.co/contact.html?topic=enterprise"

# Sticky bar that follows the user as they scroll the benefit sections.
sticky_bar_label: "Ready to step into Core?"
sticky_bar_cta: "Upgrade — $99/mo"

# State banners (driven by ?canceled=1 / ?error= query params)
canceled_banner: "Checkout canceled. You're still on Entuned Free — nothing changed. Tap upgrade again whenever you're ready."
error_banner_prefix: "Something went wrong starting checkout: "
error_banner_generic: "Please try again or reach out to us."
already_subscribed_banner: "You already have a paid subscription. Manage your plan from the billing portal in Account."

# Six benefit sections — one per Core unlock. Section id is the deep-link
# anchor the player's locked-tile footer uses (e.g. #outcomes for a tap on
# locked Calm). Keep each section scannable: icon, eyebrow, headline, body,
# proof point.
sections:
  outcomes:
    eyebrow: "Outcomes"
    headline: "All nine research-backed outcomes"
    body: "Free gives you Linger and Lift Energy. Core unlocks the full set — every outcome the research catalogue supports, ready to deploy on any floor moment."
    proof: "Calm · Linger · Lift Energy · Move Through · Reinforce Brand · Convert Browsers · Impulse Buy · Increase Order Value · Add More Items"

  icp:
    eyebrow: "Customer Profile"
    headline: "Music tailored to YOUR customer"
    body: "Free plays a general retail catalogue. Core builds the music around the specific Ideal Customer Profile you describe — taste preferences, era, sonic adjacencies, the cultural context they walk in with."
    proof: "Tell us about your customer once. Every song after that is tuned to who walks in."

  library:
    eyebrow: "Library"
    headline: "300 songs at launch · 120 added monthly"
    body: "Core ships a 300-song library tuned to your ICP on day one, with about 120 new tracks added every month. Most stores reach 420+ tracks in their first paid month."
    proof: "Free is 100 songs of general-catalogue music. Core is 300+ engineered songs, growing weekly."

  refresh:
    eyebrow: "Refresh"
    headline: "Top performers stay. Underperformers cycle out."
    body: "Songs that drive the response you want stay in heavy rotation. Songs that don't get cycled out and replaced. The library quality climbs over time instead of going stale."
    proof: "Continuous quality climb, not a static catalogue."

  control:
    eyebrow: "Control"
    headline: "Manual outcome control. Edit your ICP anytime."
    body: "Override the schedule. Switch outcomes on the floor. Update your ICP as the business evolves — the music re-tunes around the changes."
    proof: "Sales-associate-friendly web interface. Anyone behind the counter can change the floor's mode in one tap."

  licensing:
    eyebrow: "Licensing"
    headline: "Same PRO-cleared license at every tier"
    body: "Every Entuned subscription — Free included — ships with full PRO indemnification. No ASCAP, BMI, SESAC, or SoundExchange fees. The licensing protection isn't a paid upsell."
    proof: "Indemnification certificate available in your account."

# FAQ — pulled from pricing page, scoped to free→Core decision points.
faq:
  heading: "Common questions"
  items:
    - q: "Can I cancel?"
      a: "Yes, monthly. No long-term contract. Cancel from the billing portal in Account, anytime."
    - q: "What happens to my settings if I upgrade?"
      a: "Your store name, login, and any custom configuration carry over. The free plan becomes Core; you'll be prompted to fill out the Customer Profile (ICP) so the new music can be tuned to your floor."
    - q: "Is the music actually different on Core?"
      a: "Yes. Free music is engineered to general retail outcomes — it works for any store. Core music is engineered to your specific customer's taste, era, and cultural context. Different libraries, different sonic decisions, same outcome science underneath."

# Final block — single primary CTA + soft enterprise out
final:
  heading: "Ready when you are."
  subhead: "Most operators upgrade in their first paid quarter."
