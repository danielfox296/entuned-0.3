# home — editable text content
# Edit this file to change copy on the / (Home) screen.
# Vite HMR will refresh the page automatically.

# Loading + empty states for the player hero
loading: "Loading…"

# Empty state when no locations exist yet — has inline <strong> so split.
empty:
  pre: "Add your first location from the "
  strong: "Locations"
  post: " tab to get started."

# Player hero card — shown once a location exists
hero:
  headline: "Music Is Ready"
  open_player: "Launch Music Player"
  copy: "Copy link"
  copied: "Copied"

# Upgrade card copy — varies by current tier.
# free → has stat; core → no stat; pro/enterprise → no card.
upgrade:
  free:
    headline: "Boost: tune the music to your customer."
    body: "$99 per location, per month."
    cta_label: "Unlock Boost"
  core:
    headline: "Tie what you play to what you sell."
    body: "$399 per location, per month."
    cta_label: "Unlock Pro"
