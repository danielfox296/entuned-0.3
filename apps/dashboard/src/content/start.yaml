# start — editable text content
# Edit this file to change copy on the /start (sign-in) screen.
# Vite HMR will refresh the page automatically.

# Magic-link error messages keyed by ?error= query param value.
# Map keys mirror the URL token; the catch-all is `default`.
link_errors:
  token_expired: "That sign-in link expired. Send a new one — they only last 15 minutes."
  token_already_used: "That sign-in link was already used. Send a new one."
  invalid_token: "We couldn't read that sign-in link. Send a new one — sometimes copy-paste from email mangles the URL."
  missing_token: "We couldn't read that sign-in link. Send a new one — sometimes copy-paste from email mangles the URL."
  default: "Sign-in link didn't work. Send a new one below."

# Generic submit-error fallback when the API throws something unstructured
generic_error: "something went wrong"

# LEFT — value prop
value:
  headline: "Music that works your floor."
  body: "Original, retail-licensed music with a job to do. Start free on the shared catalogue — pick Chill, Steady, or Upbeat and feel the floor change. Upgrade when you want it built around your customer. No card. Plays through your existing speakers."
  bullet_1: "Licensed from day one — no ASCAP, BMI, or SESAC fees, no surprise letters"
  bullet_2: "Music with a job — stay longer, spend more — not just background"
  bullet_3: "No app: plays from a web browser on any device"

# RIGHT — auth panel
auth:
  # Sent state (after they request a magic link)
  sent_headline: "Check your inbox."
  # The "We sent a sign-in link to <email>." sentence has the email inline as
  # styled JSX, so we split: pre-email then post-email.
  sent_pre_email: "We sent a sign-in link to "
  sent_post_email: ". Click it and you're in."
  sent_spam_note: "Didn't land? Check spam — sometimes new domains get filtered."
  sent_try_different: "Try a different email →"
  # Default state (new visitor)
  headline: "Get started."
  sub: "We'll email you a sign-in link. Click it and you're in."
  email_label: "Your email"
  email_placeholder: "you@yourstore.com"
  submit: "Get my sign-in link"
  submit_busy: "Sending…"
  # Returning-user state (redirected in from a protected route)
  returning_headline: "Welcome back."
  returning_sub: "Enter your email and we'll send you a sign-in link."
  returning_submit: "Send sign-in link"
  divider: "or"
  google: "Continue with Google"
