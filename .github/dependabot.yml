# Dependabot config for entuned-0.3 (pnpm workspaces).
#
# Why only the root directory:
#   This is a pnpm workspace. The lockfile (pnpm-lock.yaml) and workspace
#   manifest (pnpm-workspace.yaml) live at the root. Dependabot's pnpm
#   updater errors out with "Updating workspaces from inside a workspace
#   subdirectory is not supported" if you also list /apps/admin, /apps/player,
#   /apps/dashboard, /apps/server here. Updating "/" already covers every
#   workspace package because the lockfile is shared.
#
# Why grouping is split by update-type:
#   Originally everything was in one "all-deps" group, which produced a
#   weekly PR with 5–7 major-version bumps mixed in (React 18→19, Vite 6→8,
#   Prisma 5→7, etc.). Merging that wholesale would cascade breakage across
#   the codebase; splitting them by hand was tedious.
#
#   New shape:
#     - `non-major` group: collapses every patch + minor bump into one PR
#       (lucide additions, AWS SDK patches, @types updates, etc.). Safe to
#       review and merge once.
#     - Majors are NOT grouped — each major-version bump gets its own PR so
#       it can be triaged, migrated, and shipped on its own timeline.
#     - `security` group: still collapses security updates into one PR
#       (security trumps the major/minor distinction).
#
# Schedule: weekly is the sane cadence — no daily PR drip — and security
# advisories still open immediately regardless of schedule.

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      non-major:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      security:
        applies-to: security-updates
        patterns:
          - "*"
    commit-message:
      prefix: "deps"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    groups:
      actions:
        patterns:
          - "*"
    commit-message:
      prefix: "ci"
