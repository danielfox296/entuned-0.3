name: Deploy admin to GitHub Pages + push player to entuned-0.3-player

on:
  push:
    branches: [main]
    paths:
      - "apps/admin/**"
      - "apps/player/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

# Opt all third-party actions still on Node 20 (peaceiris/actions-gh-pages,
# pnpm/action-setup, actions/{configure,deploy,upload}-pages) into Node 24
# ahead of the June 2026 forced cutover. Remove once each action ships a
# Node 24 release.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build admin
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: pnpm --filter admin build
      - name: Stage dist
        run: |
          mkdir -p dist
          cp -R apps/admin/dist/. dist/
          echo "dash.entuned.co" > dist/CNAME
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy-admin:
    needs: build-admin
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  # Build the player and push the static dist to danielfox296/entuned-0.3-player,
  # whose Pages serves music.entuned.co. The PLAYER_DEPLOY_TOKEN secret must be a
  # fine-grained PAT (or classic PAT) with contents:write on the player repo.
  build-and-publish-player:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build player
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: pnpm --filter player build
      - name: Stage player publish dir
        run: |
          mkdir -p publish
          cp -R apps/player/dist/. publish/
          echo "music.entuned.co" > publish/CNAME
          touch publish/.nojekyll
          # SPA fallback for client-side routing (e.g. /<store-slug> paths
          # like music.entuned.co/danielchristopherfox-0616). GitHub Pages
          # serves 404.html for any unknown path; copying index.html to
          # 404.html lets React take over and resolve the slug.
          cp publish/index.html publish/404.html
      - name: Push to entuned-0.3-player
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PLAYER_DEPLOY_TOKEN }}
          external_repository: danielfox296/entuned-0.3-player
          publish_branch: main
          publish_dir: ./publish
          # The dist replaces the entire repo content on each publish.
          force_orphan: true
          commit_message: "deploy player from entuned-0.3@${{ github.sha }}"
          user_name: "github-actions[bot]"
          user_email: "41898282+github-actions[bot]@users.noreply.github.com"
